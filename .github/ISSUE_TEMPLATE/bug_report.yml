name: Bug report
description: Report something that is broken or confusing.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the issue clearly.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open ...
        2. Load ...
        3. Click ...
    validations:
      required: false
  - type: textarea
    id: log-shape
    attributes:
      label: Log shape or sanitized sample
      description: If relevant, paste a sanitized JSONL snippet or describe the Claude Code log shape.
      render: json
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: macOS 15, Chrome 123, Node 20
    validations:
      required: false
